<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - VocabBoost</title>
    <link rel="stylesheet" href="css-file/signup.css">
</head>
<body>
    <div class="sign-box">
        <h2>Sign In</h2>
        <p class="subtitle">Sign in to join with us</p>
        
        <form id="signinForm">

            <div class="input-group">
                <label for="name">Enter your name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label for="email">Enter your email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="input-group">
                <label for="role">Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="MANUFACTURER">Manufacturer</option>
                    <option value="WAREHOUSE">Warehouse</option>
                    <option value="PHARMACY">Pharmacy</option>
                </select>
            </div>

            <div class="input-group">
                <label for="organizationName">Enter your organization name</label>
                <input type="text" id="organizationName" placeholder="Enter your organization name" required>
            </div>

            <div class="input-group">
                <label for="phone">Enter your phone number</label>
                <input type="text" id="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="input-group">
                <label for="address">Enter your address</label>
                <input type="text" id="address" placeholder="Enter your address" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="agree">
                <label for="agree">Remember me</label>
            </div>

            <button type="submit">Sign Up</button>

        </form>
        
        <p>Already have an account? <a href="login.html">Login </a></p>
    </div>
    <script src="js-file/signin.js"></script>
</body>
</html>
